name: CI/CD - Produção (Release rel)

on:
  pull_request:
    branches:
      - producao
    types:
      - closed

jobs:
  build_and_release:
    if: github.event.pull_request.merged == true
    name: Criar Release (rel-x.x)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determinar e Criar Nova Tag (rel-x.x)
        env:
          SOURCE_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          LATEST_TAG=$(git tag -l "rel-*" | sort -V | tail -n 1)
          
          if [ -z "$LATEST_TAG" ]; then
            MAJOR=1
            MINOR=0
          else
            if [[ $LATEST_TAG =~ rel-([0-9]+)\.([0-9]+) ]]; then
              MAJOR="${BASH_REMATCH[1]}"
              MINOR="${BASH_REMATCH[2]}"
            else
              MAJOR=1
              MINOR=0
            fi
          fi

          if [[ "$SOURCE_BRANCH" == "homologacao" ]]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
          elif [[ "$SOURCE_BRANCH" == hotfix/* ]]; then
            MINOR=$((MINOR + 1))
          fi

          NEW_TAG="rel-${MAJOR}.${MINOR}"
          git tag -a "$NEW_TAG" -m "Release gerada via PR da branch $SOURCE_BRANCH"
          git push origin "$NEW_TAG"