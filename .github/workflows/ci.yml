name: CI - Web Cadastro Contatos

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build e Tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Build da imagem Docker
        run: docker build -t web-cadastro-contatos:latest .

      - name: Validar arquivos estáticos
        run: echo "Validando estrutura..." && test -f index.html && test -f js/scripts.js

      - name: Criar tag de build
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          TAG="build-${TIMESTAMP}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "CI build automatico: $TAG"
          git push origin "$TAG"
          echo "Tag criada: $TAG"